<svg xmlns="http://www.w3.org/2000/svg" width="560" height="480" viewBox="0 0 560 480">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2a0808"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(227,30,36,0.1)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Main background card -->
  <rect x="40" y="40" width="480" height="400" fill="url(#bg1)" rx="2"/>
  <rect x="40" y="40" width="480" height="400" fill="url(#grid2)" rx="2"/>
  
  <!-- Red accent top bar -->
  <rect x="40" y="40" width="480" height="5" fill="#E31E24"/>
  
  <!-- Large stat blocks -->
  <rect x="70" y="80" width="180" height="120" fill="rgba(227,30,36,0.12)" rx="2"/>
  <text x="160" y="140" font-family="'Barlow Condensed',Arial,sans-serif" font-size="52" font-weight="700" fill="#E31E24" text-anchor="middle">2025</text>
  <text x="160" y="168" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">ANNÉE DE CRÉATION</text>

  <rect x="270" y="80" width="220" height="120" fill="rgba(255,255,255,0.04)" rx="2"/>
  <text x="380" y="130" font-family="'Barlow Condensed',Arial,sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle">7+</text>
  <text x="380" y="158" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">DOMAINES D'INTERVENTION</text>
  <text x="380" y="178" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">SERVICES</text>

  <!-- Divider line -->
  <line x1="70" y1="225" x2="490" y2="225" stroke="rgba(227,30,36,0.2)" stroke-width="1"/>
  
  <!-- Company name block -->
  <text x="70" y="268" font-family="'Barlow Condensed',Arial,sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="2">RM5 PLURI-SERVICES</text>
  <text x="70" y="293" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="3">SARL · MATADI, KONGO CENTRAL</text>

  <!-- Values pills -->
  <rect x="70" y="315" width="130" height="28" fill="rgba(227,30,36,0.2)" rx="14"/>
  <text x="135" y="334" font-family="Arial,sans-serif" font-size="11" fill="#E31E24" text-anchor="middle" font-weight="600" letter-spacing="1">PROFESSIONNALISME</text>

  <rect x="210" y="315" width="88" height="28" fill="rgba(255,255,255,0.07)" rx="14"/>
  <text x="254" y="334" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">INTÉGRITÉ</text>

  <rect x="308" y="315" width="90" height="28" fill="rgba(255,255,255,0.07)" rx="14"/>
  <text x="353" y="334" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">INNOVATION</text>

  <rect x="70" y="353" width="110" height="28" fill="rgba(255,255,255,0.07)" rx="14"/>
  <text x="125" y="372" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">ESPRIT D'ÉQUIPE</text>

  <rect x="190" y="353" width="140" height="28" fill="rgba(255,255,255,0.07)" rx="14"/>
  <text x="260" y="372" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">SATISFACTION CLIENT</text>

  <!-- Bottom accent -->
  <rect x="40" y="434" width="480" height="6" fill="rgba(227,30,36,0.3)"/>
  
  <!-- Small decorative elements -->
  <circle cx="460" cy="380" r="30" fill="none" stroke="rgba(227,30,36,0.15)" stroke-width="1"/>
  <circle cx="460" cy="380" r="20" fill="none" stroke="rgba(227,30,36,0.1)" stroke-width="1"/>
  <circle cx="460" cy="380" r="5" fill="#E31E24" opacity="0.5"/>
</svg>
