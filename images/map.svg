<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="background:#0d160d">
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnBox">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(61,186,80,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="380" fill="url(#grid)"/>
  <!-- Congo coastline suggestion -->
  <path d="M 100,80 Q 200,60 300,90 Q 400,110 500,85 Q 600,65 700,100 Q 750,120 780,160 L 780,280 Q 700,300 600,290 Q 500,280 400,295 Q 300,305 200,290 Q 150,285 100,280 Z" fill="rgba(26,107,42,0.08)" stroke="rgba(61,186,80,0.15)" stroke-width="1"/>
  <!-- Location marker -->
  <circle cx="390" cy="190" r="60" fill="rgba(26,107,42,0.1)" stroke="rgba(61,186,80,0.2)" stroke-width="1">
    <animate attributeName="r" values="55;70;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="190" r="30" fill="rgba(26,107,42,0.2)" stroke="rgba(61,186,80,0.35)" stroke-width="1.5"/>
  <circle cx="390" cy="190" r="10" fill="#3eba50"/>
  <circle cx="390" cy="190" r="4" fill="white"/>
  <!-- Pin -->
  <path d="M390,175 Q405,165 405,178 Q405,192 390,205 Q375,192 375,178 Q375,165 390,175Z" fill="#1a6b2a" opacity="0.9"/>
  <!-- Label box -->
  <rect x="310" y="215" width="160" height="48" rx="6" fill="rgba(8,12,8,0.92)" stroke="rgba(61,186,80,0.4)" stroke-width="1.5"/>
  <text x="390" y="233" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#3eba50" letter-spacing="1">POINTE-NOIRE</text>
  <text x="390" y="252" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">15 rue Kalli Fayette, Mpita wharf</text>
  <!-- Compass -->
  <circle cx="740" cy="60" r="24" fill="rgba(8,12,8,0.85)" stroke="rgba(61,186,80,0.3)" stroke-width="1.5"/>
  <text x="740" y="44" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#3eba50">N</text>
  <text x="740" y="78" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">S</text>
  <text x="720" y="64" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">O</text>
  <text x="760" y="64" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">E</text>
  <line x1="740" y1="46" x2="740" y2="74" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="724" y1="60" x2="756" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Coordinates badge -->
  <rect x="20" y="20" width="190" height="28" rx="4" fill="rgba(8,12,8,0.85)" stroke="rgba(61,186,80,0.25)" stroke-width="1"/>
  <text x="30" y="38" font-family="Inter,monospace" font-size="10" fill="rgba(255,255,255,0.5)">-4.81175, 11.85634</text>
  <!-- Footer bar -->
  <rect x="0" y="340" width="800" height="40" fill="rgba(26,107,42,0.15)" stroke="rgba(61,186,80,0.2)" stroke-width="0"/>
  <text x="400" y="365" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="3">MATIABA FIRM · SIÈGE SOCIAL · POINTE-NOIRE, CONGO</text>
</svg>
