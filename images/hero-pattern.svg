<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(227,30,36,0.07)" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(227,30,36,0.12)"/>
    </pattern>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0505;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#fade)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <rect width="1200" height="800" fill="url(#dots)" opacity="0.4"/>
  <!-- Geometric accent shapes -->
  <polygon points="900,0 1200,0 1200,300" fill="rgba(227,30,36,0.04)"/>
  <polygon points="1050,0 1200,0 1200,150" fill="rgba(227,30,36,0.06)"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="rgba(227,30,36,0.05)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="rgba(227,30,36,0.05)" stroke-width="1"/>
  <!-- Large decorative R -->
  <text x="620" y="700" font-family="Georgia,serif" font-size="600" font-weight="700" fill="rgba(227,30,36,0.03)" letter-spacing="-20">R</text>
  <!-- Red accent bar -->
  <rect x="0" y="796" width="1200" height="4" fill="#E31E24"/>
</svg>
