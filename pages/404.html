<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Matiaba Firm</title>
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .error-page { min-height: 100vh; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .error-code { font-family: var(--font-display); font-size: clamp(100px, 20vw, 200px); font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--green-bright), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 24px; }
    .error-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: white; margin-bottom: 16px; }
    .error-desc { font-size: 15px; color: rgba(255,255,255,0.45); margin-bottom: 40px; max-width: 420px; line-height: 1.75; }
    .error-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
<div class="error-page">
  <img src="../images/logo.png" alt="Matiaba Firm" style="height:56px;margin-bottom:48px;filter:brightness(1.1)">
  <div class="error-code">404</div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-desc">La page que vous recherchez n'existe pas ou a été déplacée. Revenez à l'accueil ou découvrez nos services.</p>
  <div class="error-actions">
    <a href="../index.html" class="btn-green" style="text-decoration:none;padding:14px 32px;background:linear-gradient(135deg,var(--green),var(--green-light));color:white;border-radius:100px;font-size:13px;font-weight:600">← Retour à l'accueil</a>
    <a href="services.html" style="text-decoration:none;padding:14px 32px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border-radius:100px;font-size:13px;font-weight:600">Nos services</a>
  </div>
</div>
</body>
</html>
